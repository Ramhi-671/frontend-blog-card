<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&family=Outfit:wght@100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  
  <title>Frontend Mentor | Blog preview card</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution { font-size: 0.6875rem; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style>
</head>
<body>
  <main>
    <img class="card_img" src="./assets/images/illustration-article.svg" alt="abstract artwork">
    <article>
      <div class="card_tag">Learning</div>

      <div class="card_date">Published 21 Dec 2023</div>

      <div class="card_title">HTML & CSS foundations</div>

      <div class="card_desc">These languages are the backbone of every website, defining structure, content, and presentation.</div>

    </article>

    <div class="author">
      <img class="author_icon" src="./assets/images/image-avatar.webp" alt="author's profile picture">
      <div class="author_name">Greg Hooper</div>
    </div>

  </main>

  
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="https://github.com/Ramhi-671?tab=overview&from=2026-05-01&to=2026-05-22">Ramhi</a>.
  </footer>
</body>
</html>
